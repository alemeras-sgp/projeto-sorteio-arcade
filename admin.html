<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Painel Admin - Sorteio</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #121214;
            color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 12px;
            border: 1px solid #333;
            text-align: left;
        }

        th {
            background: #8257e5;
        }

        .btn-export {
            background: #00875f;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>PAINEL</h1>

    <div
        style="background: #202024; padding: 20px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #8257e5;">
        <h2 style="color: #8257e5; margin-top: 0;">⚙️ Gerador de Novo Sorteio</h2>
        <div style="display: flex; gap: 15px; align-items: flex-end;">
            <div>
                <label>Valor por Número (R$):</label><br>
                <input type="number" step="0.01" id="novo-valor" value="0.05"
                    style="padding: 8px; background: #121214; color: white; border: 1px solid #444;">
            </div>
            <div>
                <label>Qtd de Números:</label><br>
                <input type="number" id="nova-qtd" value="100"
                    style="padding: 8px; background: #121214; color: white; border: 1px solid #444;">
            </div>
            <button onclick="gerarNovoSorteio()"
                style="background: #8257e5; color: white; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold;">
                GERAR NOVO SORTEIO
            </button>
        </div>
        <p style="font-size: 0.8rem; color: #ff4d4d; margin-top: 10px;">⚠️ ATENÇÃO: Isso apagará TODOS os dados do
            sorteio atual!</p>
    </div>


    <h1>SORTEIO ATUAL</h1>
    <button class="btn-export" onclick="exportarCSV()">Exportar para Excel</button>

    <table>
        <thead>
            <tr>
                <th>Números</th>
                <th>Nome</th>
                <th>WhatsApp</th>
                <th>E-mail</th>
                <th>Mensagem</th>
            </tr>
        </thead>
        <tbody id="tabela-admin"></tbody>
    </table>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js"></script>
    <script>
        const inputValor = document.getElementById('novo-valor');
        inputValor.addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, '');
            v = (v / 100).toFixed(2);
            e.target.value = v;
        });
    </script>

</body>

</html>
