<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerta OBS - Sorteio</title>

    <style>
        /* Fundo transparente essencial para o OBS */
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            /* Evita barra de rolagem no OBS */

            /* CENTRALIZAÇÃO TOTAL */
            display: flex;
            justify-content: center;
            /* Centraliza horizontalmente */
            align-items: center;
            /* Centraliza verticalmente */
            height: 100vh;
            /* Usa toda a altura da tela */
        }

        #container-alerta {
            background: linear-gradient(135deg, #8257e5 0%, #4a23a4 100%);
            color: white;
            padding: 25px 35px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
            width: 450px;
            /* Aumentei um pouquinho pra dar mais destaque no centro */
            text-align: center;
            border: 3px solid #9f75ff;

            /* Estado inicial escondido (agora ele sobe pro centro) */
            opacity: 0;
            transform: translateY(150px) scale(0.8);
            /* Começa mais baixo e menor */
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Efeito de mola mais suave */
        }

        /* Classe que fará o alerta pular na tela */
        #container-alerta.mostrar {
            opacity: 1;
            transform: translateY(0) scale(1);
            /* Volta pro tamanho e posição original (centro) */
        }

        #nome-usuario {
            margin: 0 0 12px 0;
            font-size: 2rem;
            color: #00e676;
            /* Verde chamativo pro nome */
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            font-weight: 800;
        }

        #msg-usuario {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 600;
            line-height: 1.4;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body>
    <button id="btn-desbloqueio"
        style="position: absolute; top: 20px; left: 20px; z-index: 9999; padding: 20px; background-color: #ff0000; color: white; font-weight: bold; border: none; border-radius: 8px; cursor: pointer;">
        🔴 CLIQUE AQUI NO OBS (INTERAGIR) PARA LIBERAR ÁUDIO
    </button>
    <div id="container-alerta">
        <h2 id="nome-usuario">Nome de Teste</h2>
        <p id="msg-usuario">Bora Alemeras! Rumo a esse Arcade Stick brabo demais!</p>
    </div>

    <audio id="player-voz" style="display: none;"></audio>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 1. Configuração do Supabase
        const supabaseUrl = 'https://wfnimuncbyvfglhbqjtj.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmbmltdW5jYnl2ZmdsaGJxanRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MTkwMzIsImV4cCI6MjA5NjE5NTAzMn0.Q9GD87K1hQ0IYzN0sXuKOUWBvbXT9-K0DhWorIJwDdw';
        const db = window.supabase.createClient(supabaseUrl, supabaseKey);

        // INÍCIO DA INSERÇÃO: Lógica de destrave
        document.getElementById('btn-desbloqueio').addEventListener('click', () => {
            // URL de um efeito sonoro de 'bip' oficial do Google. 100% a prova de falhas de rede.
            const somTeste = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

            somTeste.play().then(() => {
                console.log("OBS destravou o áudio com sucesso!");
                // Esconde o botão após destravar
                document.getElementById('btn-desbloqueio').style.display = 'none';
            }).catch(err => {
                console.error("Erro no destrave:", err);
            });
        });

        // FIM DA INSERÇÃO
        // 2. Sistema de Fila (Queue)
        const filaAlertas = [];
        let exibindoAlerta = false;

        // 3. O Ouvinte do Banco de Dados (Realtime)
        db.channel('mudancas_obs')
            .on('postgres_changes',
                { event: 'UPDATE', schema: 'public', table: 'sorteio' },
                (payload) => {
                    const numeroMudou = payload.new;
                    const numeroAntigo = payload.old;

                    if (numeroMudou.status === 'pago' && numeroAntigo.status !== 'pago') {
                        filaAlertas.push({
                            nome: numeroMudou.nome_comprador,
                            mensagem: numeroMudou.mensagem_live || "Comprou e já garantiu a participação no sorteio!"
                        });
                        processarFila();
                    }
                }
            ).subscribe();



        // 4. O Motor da Fila e do TTS (Robô de Voz atualizado)
        async function processarFila() {
            if (exibindoAlerta || filaAlertas.length === 0) return;

            exibindoAlerta = true;
            const alertaAtual = filaAlertas.shift();

            // 1. Limpa a mensagem (remove a tag de voz invisível "Vitoria|" que o seu script ainda envia)
            let textoReal = alertaAtual.mensagem || "";
            if (textoReal.includes('|')) {
                textoReal = textoReal.split('|')[1].trim();
            }

            // 2. Exibir na tela
            document.getElementById('nome-usuario').textContent = alertaAtual.nome;
            document.getElementById('msg-usuario').textContent = textoReal;
            const container = document.getElementById('container-alerta');
            container.classList.add('mostrar');

            // 3. Tocar o som de notificação
            // DICA: Você pode baixar um som de caixa registradora ou "ding" em mp3, 
            // colocar na mesma pasta do alertas.html e mudar aqui para: new Audio("seu-som.mp3")
            const somNotificacao = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
            somNotificacao.volume = 0.5; // Ajuste o volume se achar muito alto

            somNotificacao.play().catch(e => console.error("Erro no áudio do OBS:", e));

            // 4. Tempo na tela (8 segundos para dar tempo de você ler ao vivo)
            setTimeout(() => {
                container.classList.remove('mostrar');
                setTimeout(() => {
                    exibindoAlerta = false;
                    processarFila();
                }, 600); // Tempo para a animação CSS terminar de sumir
            }, 8000); // 8000 milissegundos = 8 segundos
        }
    </script>
</body>

</html>
