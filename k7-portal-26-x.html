<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Painel Admin - Sorteio</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #121214;
            color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 12px;
            border: 1px solid #333;
            text-align: left;
        }

        th {
            background: #8257e5;
        }

        .btn-export {
            background: #00875f;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
        }

        /* =========================================
   LOGIN: CENTRALIZADO E PREMIUM
   ========================================= */
        .login-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            /* Fundo degradê cinza para preto */
            background: linear-gradient(135deg, #121214 0%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
        }

        .login-box {
            background: #18181b;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid #27272a;
            text-align: center;
        }

        .login-box h2 {
            color: #ffffff;
            margin-bottom: 25px;
            font-size: 1.5rem;
            font-weight: 500;
        }

        /* Inputs focados e clean */
        .login-box input {
            width: 100%;
            padding: 14px;
            background: #09090b;
            border: 1px solid #27272a;
            border-radius: 8px;
            color: #fff;
            margin-bottom: 15px;
            box-sizing: border-box;
            transition: border 0.3s;
        }

        .login-box input:focus {
            border-color: #015488;
            /* Roxo do seu painel */
            outline: none;
        }

        /* Botão destaque */
        #btn-login-admin {
            width: 100%;
            padding: 14px;
            background: #015488;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        #btn-login-admin:hover {
            background: #015488;
        }
    </style>
</head>

<body>


    <div id="tela-login" class="login-container">
        <div class="login-box">
            <h2>RESTRITO O BAGULHO</h2>
            <input type="email" id="email-admin" placeholder="E-mail">
            <input type="password" id="senha-admin" placeholder="Senha">
            <button id="btn-login-admin">Entrar</button>
            <p id="erro-login" style="display: none; color: #ff4747; margin-top: 15px; font-size: 0.8rem;"></p>
        </div>
    </div>



    <div id="conteudo-admin" style="display: none;">

        <h1>PAINEL</h1>
        <button id="btn-logout"
            style="background: #ff4747; padding: 8px 16px; border: none; border-radius: 4px; color: white; cursor: pointer; margin-bottom: 20px;">
            Sair do Painel (Logout)
        </button>
        <div
            style="background: #202024; padding: 20px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #8257e5;">
            <h2 style="color: #8257e5; margin-top: 0;">⚙️ Gerador de Novo Sorteio</h2>
            <div style="display: flex; gap: 15px; align-items: flex-end;">
                <div>
                    <label>Nome do Sorteio:</label><br>
                    <input type="text" id="novo-nome" placeholder="Ex: Sorteio"
                        style="padding: 8px; background: #121214; color: white; border: 1px solid #444;">
                </div>
                <div>
                    <label>Valor por Número (R$):</label><br>
                    <input type="text" id="novo-valor" placeholder="10,00"
                        style="padding: 8px; background: #121214; color: white; border: 1px solid #444;"
                        oninput="aplicarMascaraMoeda(this)">
                </div>
                <div>
                    <label>Qtd de Números:</label><br>
                    <input type="number" id="nova-qtd" value="100"
                        style="padding: 8px; background: #121214; color: white; border: 1px solid #444;">
                </div>
                <div>
                    <label>Estado do Produto:</label><br>
                    <select id="novo-estado"
                        style="padding: 8px; background: #121214; color: white; border: 1px solid #444; height: 35px;">
                        <option value="Novo">Novo</option>
                        <option value="Usado">Usado</option>
                    </select>
                </div>
                <div>
                    <label>Tempo para PIX (minutos):</label><br>
                    <input type="number" id="novo-tempo" value="10"
                        style="padding: 8px; background: #121214; color: white; border: 1px solid #444;">
                </div>
                <button onclick="gerarNovoSorteio()"
                    style="background: #8257e5; color: white; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold;">
                    GERAR NOVO SORTEIO
                </button>
            </div>
            <p style="font-size: 0.8rem; color: #ff4d4d; margin-top: 10px;">⚠️ ATENÇÃO: Isso apagará TODOS os dados do
                sorteio atual!</p>
        </div>


        <h1>SORTEIO ATUAL</h1>
        <button class="btn-export" onclick="exportarCSV()">Exportar para Excel</button>
        <div id="painel-status"
            style="background: #202024; padding: 15px; border-radius: 8px; margin: 20px 0; border-left: 4px solid #8257e5; display: flex; flex-wrap: wrap; gap: 20px;">
            <div><strong>Sorteio:</strong> <span id="status-nome">...</span></div>
            <div><strong>Criado em:</strong> <span id="status-data">...</span></div>
            <div><strong>Valor do número:</strong> <span id="status-valor">...</span></div>
            <div><strong>Números:</strong> <span id="status-qtd">...</span></div>
            <div><strong>Estado do produto sorteado:</strong> <span id="status-estado">...</span></div>
            <div><strong>Tempo Pix:</strong> <span id="status-tempo">...</span> min</div>
        </div>


        <table>
            <thead>
                <tr>
                    <th>Números</th>
                    <th>Nome</th>
                    <th>WhatsApp</th>
                    <th>E-mail</th>
                    <th>Mensagem</th>
                </tr>
            </thead>
            <tbody id="tabela-admin"></tbody>
        </table>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db-config.js"></script>
    <script src="admin.js"></script>

</body>

</html>
